<!DOCTYPE html>
<html>
<head>
    <title>IOD Ngoprek - Redirector</title>
</head>
<body>
    <script>
        const queryString = window.location.search;
        // Ganti & jadi %26 supaya parameter UTM aman sampai di aplikasi
        const sanitizedParams = queryString.substring(1).replace(/&/g, '%26');
        
        // Custom Scheme sesuai manifest kamu
        const customScheme = "ilmuone://promo" + queryString;
        
        // Karena app tidak ada di Play Store, kita arahkan ke halaman sukses jika gagal
        const fallbackPage = "https://pea-izzaldi.github.io/redirector-testing/success.html";

        // Mencoba membuka aplikasi
        window.location.href = customScheme;

        // Jika app tidak terinstall, dalam 2.5 detik lempar ke halaman informasi
        setTimeout(function() {
            window.location.href = fallbackPage + "?status=app_not_found&" + sanitizedParams;
        }, 2500);
    </script>
    <p>Mengarahkan ke aplikasi com.iod.ngoprek...</p>
</body>
</html>
