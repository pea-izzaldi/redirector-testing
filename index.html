<!DOCTYPE html>
<html>
<head>
    <title>Redirector - IlmuOne Data Ngoprek</title>
</head>
<body>
    <script>
        // 1. Ambil query string (?utm_source=fb...)
        const queryString = window.location.search;
        
        // 2. Setup link custom scheme untuk Re-engagement (buka app langsung)
        const customScheme = "ilmuone://promo" + queryString;
        
        // 3. Setup link Play Store dengan encoding & menjadi %26
        const packageName = "com.iod.ngoprek";
        // Kita buang tanda '?' di awal dengan substring(1) lalu ganti &
        const sanitizedReferrer = queryString.substring(1).replace(/&/g, '%26');
        const playStoreLink = "https://play.google.com/store/apps/details?id=" + packageName + "&referrer=" + sanitizedReferrer;

        // --- EKSEKUSI ---
        
        // Coba buka aplikasi dulu (untuk user yang sudah install)
        window.location.href = customScheme;

        // Fallback ke Play Store setelah 2 detik
        setTimeout(function() {
            window.location.href = playStoreLink;
        }, 2000);
    </script>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p>Mengarahkan ke aplikasi...</p>
        <p style="font-size: 12px; color: gray;">Jika tidak otomatis, <a id="manual" href="#">klik di sini</a></p>
    </div>
    <script>
        document.getElementById('manual').href = playStoreLink;
    </script>
</body>
</html>
